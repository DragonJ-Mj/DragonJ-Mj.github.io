<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archives — Dragon.xyz</title>
  <meta name="description" content="Neural logs and technical deployment history." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <div class="container" style="max-width:1100px">
      <div class="section-label">▸ Neural_Archives_11.0</div>
      <h1 class="section-title" style="font-style:italic; text-transform:uppercase">Transmissions</h1>
      <p class="section-desc">A serialized collection of research notes on Support Vector Machines, React architecture, and offensive security protocols.</p>

      <div style="display:flex; flex-wrap:wrap; gap:1rem; padding:.5rem; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05); border-radius:1.5rem; margin-bottom:3rem">
        <input id="q" type="text" placeholder="SEARCH_NEURAL_DATABASE..." style="flex:1; min-width:200px; padding:.85rem 1.25rem; background:transparent; border:none; outline:none; color:var(--text); font-family:var(--font-mono); font-size:.7rem; text-transform:uppercase; letter-spacing:.2em" oninput="render()" />
        <div style="display:flex; gap:.4rem; padding-left:1rem; border-left:1px solid var(--border)">
          <button data-f="all" class="filter active">All_Data</button>
          <button data-f="published" class="filter">Prod_Logs</button>
          <button data-f="draft" class="filter">Local_Dev</button>
        </div>
      </div>

      <div id="list" class="blog-list"></div>
    </div>
  </main>

  <style>
    .filter { padding:.5rem 1rem; border-radius:999px; font-family:var(--font-mono); font-size:.65rem; font-weight:900; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); }
    .filter.active { background:var(--accent); color:white; box-shadow:0 0 20px rgba(59,130,246,.3); }
  </style>

  <script src="/script.js"></script>
  <script src="/blog/posts.js"></script>
  <script>
    mountChrome('/blog/');
    let filter = 'all';
    document.querySelectorAll('.filter').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); filter = b.dataset.f; render();
    }));
    function render() {
      const q = document.getElementById('q').value.toLowerCase();
      const filtered = window.POSTS.filter(p => {
        const okF = filter === 'all' || p.status === filter;
        const okQ = !q || p.title.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q));
        return okF && okQ;
      });
      document.getElementById('list').innerHTML = filtered.length ? filtered.map(p => `
        <a class="blog-item" href="/blog/post.html?slug=${p.slug}">
          <div>
            <div class="font-mono" style="font-size:.65rem; color:var(--accent); font-weight:900; text-transform:uppercase; letter-spacing:.15em">⊙ Hash_${p.slug.substring(0,6)}</div>
            <div class="font-mono" style="font-size:.7rem; color:var(--muted); margin-top:.5rem">📅 ${p.date}</div>
          </div>
          <div>
            <h3>${p.title}</h3>
            <p style="color:var(--muted); font-size:.85rem; font-style:italic; margin-top:.35rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${p.excerpt}</p>
          </div>
          <div style="text-align:right">
            <div class="font-mono" style="font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.15em">Read_Time</div>
            <div style="font-size:.85rem; font-weight:700">${p.readTime}</div>
          </div>
        </a>`).join('') : `<p style="text-align:center; color:var(--muted); padding:3rem">No transmissions found.</p>`;
    }
    render();
  </script>
</body>
</html>
