<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="t">Post — Dragon.xyz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <div class="container" style="max-width:760px">
      <a href="/blog/" style="color:var(--accent); font-size:.9rem; display:inline-flex; gap:.5rem; margin-bottom:2rem">← All posts</a>
      <div id="post"></div>
    </div>
  </main>

  <script src="/script.js"></script>
  <script src="/blog/posts.js"></script>
  <script>
    mountChrome('/blog/');
    const slug = new URLSearchParams(location.search).get('slug');
    const post = window.POSTS.find(p => p.slug === slug);
    if (!post) {
      document.getElementById('post').innerHTML = '<h1>Post not found</h1>';
    } else {
      document.getElementById('t').textContent = post.title + ' — Dragon.xyz';
      document.getElementById('post').innerHTML = `
        <div style="display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1rem">${post.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <h1 style="font-family:var(--font-display); font-size:clamp(2rem,5vw,3.5rem); margin-bottom:1rem; line-height:1.1">${post.title}</h1>
        <p style="font-size:1.1rem; color:var(--muted-2); margin-bottom:1.5rem">${post.excerpt}</p>
        <div class="font-mono" style="display:flex; flex-wrap:wrap; gap:1.5rem; font-size:.8rem; color:var(--muted); padding-bottom:2rem; margin-bottom:2rem; border-bottom:1px solid var(--border)">
          <span>📅 ${post.date}</span><span>⏱ ${post.readTime}</span><span>✍ ${post.author}</span>
        </div>
        <article class="prose">${post.content}</article>
        <div style="margin-top:4rem; padding-top:2rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem">
          <a href="/blog/" class="btn">← Back to all posts</a>
          <a href="/contact/" class="btn btn-primary">Got thoughts? Reach out →</a>
        </div>`;
    }
  </script>
</body>
</html>
